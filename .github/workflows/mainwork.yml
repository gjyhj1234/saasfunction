      - name: 提交当前阶段成果
        if: steps.检查状态.outputs.已完成 != 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add "$文档目录" "$状态目录" || true
          git diff --cached --quiet && echo "没有变更，无需提交。" && exit 0
          git commit -m "docs(requirements): 完成阶段 job_07_扩展功能树"
          git pull --rebase origin "${GITHUB_REF_NAME}" || true
          git push origin "HEAD:${GITHUB_REF_NAME}"

  job_08_生成页面详细设计:
    name: job_08_生成页面详细设计
    needs: job_07_扩展功能树
    runs-on: ubuntu-latest
    steps:
      - name: 检出代码
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 拉取最新提交
        run: git pull --rebase origin "${GITHUB_REF_NAME}" || true

      - name: 检查前置阶段是否完成
        run: |
          test -f "$状态目录/job_07_扩展功能树.json"
          grep -q '"status":[[:space:]]*"completed"' "$状态目录/job_07_扩展功能树.json"

      - name: 检查当前阶段是否已完成
        id: 检查状态
        run: |
          状态文件="$状态目录/job_08_生成页面详细设计.json"
          if [ -f "$状态文件" ] && grep -q '"status":[[:space:]]*"completed"' "$状态文件"; then
            echo "已完成=true" >> "$GITHUB_OUTPUT"
          else
