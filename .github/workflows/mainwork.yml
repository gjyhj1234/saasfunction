      - name: 拉取最新提交
        run: git pull --rebase origin "${GITHUB_REF_NAME}" || true

      - name: 检查前置阶段是否完成
        run: |
          test -f "$状态目录/job_06_建立菜单结构.json"
          grep -q '"status":[[:space:]]*"completed"' "$状态目录/job_06_建立菜单结构.json"

      - name: 检查当前阶段是否已完成
        id: 检查状态
        run: |
          状态文件="$状态目录/job_07_扩展功能树.json"
          if [ -f "$状态文件" ] && grep -q '"status":[[:space:]]*"completed"' "$状态文件"; then
            echo "已完成=true" >> "$GITHUB_OUTPUT"
          else
            echo "已完成=false" >> "$GITHUB_OUTPUT"
          fi

      - name: 生成功能树文档
        if: steps.检查状态.outputs.已完成 != 'true'
        run: |
          mkdir -p "$文档目录/03-information-architecture"

          cat > "$文档目录/03-information-architecture/feature-tree.md" <<'EOF'
          # 功能树
          - 状态：已完成
          - 生成阶段：job_07_扩展功能树
          EOF

      - name: 写入阶段状态
        if: steps.检查状态.outputs.已完成 != 'true'
        run: |
          cat > "$状态目录/job_07_扩展功能树.json" <<EOF
          {
            "job": "job_07_扩展功能树",
            "status": "completed",
            "scope": "${执行范围}"
          }
