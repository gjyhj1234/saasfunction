name: 需求工程流水线

on:
  workflow_dispatch:
    inputs:
      执行范围:
        description: "执行范围，例如：all / mvp / module-appointments / module-patients"
        required: false
        default: "mvp"
        type: string
      编码前停止:
        description: "是否在编码前强制停止"
        required: true
        default: true
        type: boolean

permissions:
  contents: write
  actions: read

concurrency:
  group: requirements-pipeline-${{ github.ref }}-${{ inputs.执行范围 }}
  cancel-in-progress: false

env:
  执行范围: ${{ inputs.执行范围 }}
  编码前停止: ${{ inputs.编码前停止 }}
  输出目录: artifacts/requirements/latest
  文档目录: docs/specs
  状态目录: .github/requirements-status

jobs:
  job_01_收集资料与竞品信息:
    name: job_01_收集资料与竞品信息
    runs-on: ubuntu-latest
    steps:
      - name: 检出代码
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 拉取最新提交
        run: |
          git pull --rebase origin "${GITHUB_REF_NAME}" || true

      - name: 检查是否已完成
        id: 检查状态
        shell: bash
        run: |
          mkdir -p "$状态目录"
          状态文件="$状态目录/job_01_收集资料与竞品信息.json"

          if [ -f "$状态文件" ] && grep -q '"status":[[:space:]]*"completed"' "$状态文件"; then
            echo "已完成=true" >> "$GITHUB_OUTPUT"
            echo "阶段已完成，跳过执行。"
          else
            echo "已完成=false" >> "$GITHUB_OUTPUT"
            echo "阶段未完成，需要执行。"
          fi

      - name: 生成资料收集文档
        if: steps.检查状态.outputs.已完成 != 'true'
        shell: bash
        run: |
          mkdir -p "$输出目录"
          mkdir -p "$文档目录/01-research/competitors"

          cat > "$输出目录/research-index.json" <<EOF
          {
            "scope": "${执行范围}",
            "job": "job_01_收集资料与竞品信息",
            "status": "completed"
          }
          EOF

          cat > "$文档目录/01-research/market-summary.md" <<EOF
          # 市场调研汇总

          - 状态：已完成
          - 生成阶段：job_01_收集资料与竞品信息
          - 执行范围：${执行范围}

          ## 目标
          收集口腔 SaaS、医疗 SaaS、CRM、收费/库存/报表相关资料，建立原始资料集。
          EOF

      - name: 写入阶段状态
        if: steps.检查状态.outputs.已完成 != 'true'
        shell: bash
        run: |
          mkdir -p "$状态目录"
          cat > "$状态目录/job_01_收集资料与竞品信息.json" <<EOF
          {
            "job": "job_01_收集资料与竞品信息",
            "status": "completed",
            "scope": "${执行范围}"
          }
          EOF

      - name: 提交当前阶段成果
        if: steps.检查状态.outputs.已完成 != 'true'
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add "$输出目录" "$文档目录" "$状态目录" || true

          if git diff --cached --quiet; then
            echo "没有变更，无需提交。"
            exit 0
          fi

          git commit -m "docs(requirements): 完成阶段 job_01_收集资料与竞品信息"
          git pull --rebase origin "${GITHUB_REF_NAME}" || true
          git push origin "HEAD:${GITHUB_REF_NAME}"

  job_02_规范化调研结果:
    name: job_02_规范化调研结果
    needs: job_01_收集资料与竞品信息
    runs-on: ubuntu-latest
    steps:
      - name: 检出代码
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 拉取最新提交
        run: |
          git pull --rebase origin "${GITHUB_REF_NAME}" || true

      - name: 检查前置阶段是否完成
        shell: bash
        run: |
          test -f "$状态目录/job_01_收集资料与竞品信息.json"
          grep -q '"status":[[:space:]]*"completed"' "$状态目录/job_01_收集资料与竞品信息.json"

      - name: 检查当前阶段是否已完成
        id: 检查状态
        shell: bash
        run: |
          状态文件="$状态目录/job_02_规范化调研结果.json"
          if [ -f "$状态文件" ] && grep -q '"status":[[:space:]]*"completed"' "$状态文件"; then
            echo "已完成=true" >> "$GITHUB_OUTPUT"
          else
            echo "已完成=false" >> "$GITHUB_OUTPUT"
          fi

      - name: 生成规范化文档
        if: steps.检查状态.outputs.已完成 != 'true'
        shell: bash
        run: |
          mkdir -p "$文档目录/01-research"

          cat > "$文档目录/01-research/feature-comparison-matrix.md" <<'EOF'
          # 功能对比矩阵
          - 状态：已完成
          - 生成阶段：job_02_规范化调研结果
          EOF

          cat > "$文档目录/01-research/menu-comparison-matrix.md" <<'EOF'
          # 菜单对比矩阵
          - 状态：已完成
          - 生成阶段：job_02_规范化调研结果
          EOF

          cat > "$文档目录/01-research/role-comparison-matrix.md" <<'EOF'
          # 角色对比矩阵
          - 状态：已完成
          - 生成阶段：job_02_规范化调研结果
          EOF

      - name: 写入阶段状态
        if: steps.检查状态.outputs.已完成 != 'true'
        shell: bash
        run: |
          cat > "$状态目录/job_02_规范化调研结果.json" <<EOF
          {
            "job": "job_02_规范化调研结果",
            "status": "completed",
            "scope": "${执行范围}"
          }
          EOF

      - name: 提交当前阶段成果
        if: steps.检查状态.outputs.已完成 != 'true'
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add "$文档目录" "$状态目录" || true

          if git diff --cached --quiet; then
            echo "没有变更，无需提交。"
            exit 0
          fi

          git commit -m "docs(requirements): 完成阶段 job_02_规范化调研结果"
          git pull --rebase origin "${GITHUB_REF_NAME}" || true
          git push origin "HEAD:${GITHUB_REF_NAME}"

  job_03_定义产品范围:
    name: job_03_定义产品范围
    needs: job_02_规范化调研结果
    runs-on: ubuntu-latest
    steps:
      - name: 检出代码
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 拉取最新提交
        run: git pull --rebase origin "${GITHUB_REF_NAME}" || true

      - name: 检查前置阶段是否完成
        run: |
          test -f "$状态目录/job_02_规范化调研结果.json"
          grep -q '"status":[[:space:]]*"completed"' "$状态目录/job_02_规范化调研结果.json"

      - name: 检查当前阶段是否已完成
        id: 检查状态
        shell: bash
        run: |
          状态文件="$状态目录/job_03_定义产品范围.json"
          if [ -f "$状态文件" ] && grep -q '"status":[[:space:]]*"completed"' "$状态文件"; then
            echo "已完成=true" >> "$GITHUB_OUTPUT"
          else
            echo "已完成=false" >> "$GITHUB_OUTPUT"
          fi

      - name: 生成范围定义文档
        if: steps.检查状态.outputs.已完成 != 'true'
        run: |
          mkdir -p "$文档目录/00-governance"
          mkdir -p "$文档目录/02-architecture"

          cat > "$文档目录/00-governance/scope-definition.md" <<'EOF'
          # 范围定义

          - 状态：已完成
          - 生成阶段：job_03_定义产品范围

          ## 当前范围内
          - 待补充

          ## 当前范围外
          - 待补充
          EOF

          cat > "$文档目录/02-architecture/product-boundary.md" <<'EOF'
          # 产品边界
          - 状态：已完成
          - 生成阶段：job_03_定义产品范围
          EOF

      - name: 写入阶段状态
        if: steps.检查状态.outputs.已完成 != 'true'
        run: |
          cat > "$状态目录/job_03_定义产品范围.json" <<EOF
          {
            "job": "job_03_定义产品范围",
            "status": "completed",
            "scope": "${执行范围}"
          }
          EOF

      - name: 提交当前阶段成果
        if: steps.检查状态.outputs.已完成 != 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add "$文档目录" "$状态目录" || true
          git diff --cached --quiet && echo "没有变更，无需提交。" && exit 0
          git commit -m "docs(requirements): 完成阶段 job_03_定义产品范围"
          git pull --rebase origin "${GITHUB_REF_NAME}" || true
          git push origin "HEAD:${GITHUB_REF_NAME}"

  job_04_定义系统蓝图:
    name: job_04_定义系统蓝图
    needs: job_03_定义产品范围
    runs-on: ubuntu-latest
    steps:
      - name: 检出代码
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 拉取最新提交
        run: git pull --rebase origin "${GITHUB_REF_NAME}" || true

      - name: 检查前置阶段是否完成
        run: |
          test -f "$状态目录/job_03_定义产品范围.json"
          grep -q '"status":[[:space:]]*"completed"' "$状态目录/job_03_定义产品范围.json"

      - name: 检查当前阶段是否已完成
        id: 检查状态
        run: |
          状态文件="$状态目录/job_04_定义系统蓝图.json"
          if [ -f "$状态文件" ] && grep -q '"status":[[:space:]]*"completed"' "$状态文件"; then
            echo "已完成=true" >> "$GITHUB_OUTPUT"
          else
            echo "已完成=false" >> "$GITHUB_OUTPUT"
          fi

      - name: 生成系统蓝图文档
        if: steps.检查状态.outputs.已完成 != 'true'
        run: |
          mkdir -p "$文档目录/02-architecture"

          cat > "$文档目录/02-architecture/system-overview.md" <<'EOF'
          # 系统总览
          - 状态：已完成
          - 生成阶段：job_04_定义系统蓝图
          EOF

          cat > "$文档目录/02-architecture/tenant-model.md" <<'EOF'
          # 租户模型
          - 状态：已完成
          - 生成阶段：job_04_定义系统蓝图
          EOF

          cat > "$文档目录/02-architecture/organization-model.md" <<'EOF'
          # 组织模型
          - 状态：已完成
          - 生成阶段：job_04_定义系统蓝图
          EOF

          cat > "$文档目录/02-architecture/non-functional-requirements.md" <<'EOF'
          # 非功能需求
          - 状态：已完成
          - 生成阶段：job_04_定义系统蓝图
          EOF

          cat > "$文档目录/02-architecture/security-and-audit.md" <<'EOF'
          # 安全与审计
          - 状态：已完成
          - 生成阶段：job_04_定义系统蓝图
          EOF

      - name: 写入阶段状态
        if: steps.检查状态.outputs.已完成 != 'true'
        run: |
          cat > "$状态目录/job_04_定义系统蓝图.json" <<EOF
          {
            "job": "job_04_定义系统蓝图",
            "status": "completed",
            "scope": "${执行范围}"
          }
          EOF

      - name: 提交当前阶段成果
        if: steps.检查状态.outputs.已完成 != 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add "$文档目录" "$状态目录" || true
          git diff --cached --quiet && echo "没有变更，无需提交。" && exit 0
          git commit -m "docs(requirements): 完成阶段 job_04_定义系统蓝图"
          git pull --rebase origin "${GITHUB_REF_NAME}" || true
          git push origin "HEAD:${GITHUB_REF_NAME}"

  job_05_定义基础规范:
    name: job_05_定义基础规范
    needs: job_04_定义系统蓝图
    runs-on: ubuntu-latest
    steps:
      - name: 检出代码
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 拉取最新提交
        run: git pull --rebase origin "${GITHUB_REF_NAME}" || true

      - name: 检查前置阶段是否完成
        run: |
          test -f "$状态目录/job_04_定义系统蓝图.json"
          grep -q '"status":[[:space:]]*"completed"' "$状态目录/job_04_定义系统蓝图.json"

      - name: 检查当前阶段是否已完成
        id: 检查状态
        run: |
          状态文件="$状态目录/job_05_定义基础规范.json"
          if [ -f "$状态文件" ] && grep -q '"status":[[:space:]]*"completed"' "$状态文件"; then
            echo "已完成=true" >> "$GITHUB_OUTPUT"
          else
            echo "已完成=false" >> "$GITHUB_OUTPUT"
          fi

      - name: 生成基础规范文档
        if: steps.检查状态.outputs.已完成 != 'true'
        shell: bash
        run: |
          mkdir -p "$文档目录/05-design-system"
          mkdir -p "$文档目录/00-governance"

          for file in design-principles.md layout-spec.md form-spec.md table-spec.md modal-drawer-spec.md interaction-spec.md copywriting-spec.md common-components.md; do
            cat > "$文档目录/05-design-system/$file" <<EOF
          # ${file%.md}
          - 状态：已完成
          - 生成阶段：job_05_定义基础规范
          EOF
          done

          cat > "$文档目录/00-governance/naming-conventions.md" <<'EOF'
          # 命名规范
          - 状态：已完成
          - 生成阶段：job_05_定义基础规范
          EOF

      - name: 写入阶段状态
        if: steps.检查状态.outputs.已完成 != 'true'
        run: |
          cat > "$状态目录/job_05_定义基础规范.json" <<EOF
          {
            "job": "job_05_定义基础规范",
            "status": "completed",
            "scope": "${执行范围}"
          }
          EOF

      - name: 提交当前阶段成果
        if: steps.检查状态.outputs.已完成 != 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add "$文档目录" "$状态目录" || true
          git diff --cached --quiet && echo "没有变更，无需提交。" && exit 0
          git commit -m "docs(requirements): 完成阶段 job_05_定义基础规范"
          git pull --rebase origin "${GITHUB_REF_NAME}" || true
          git push origin "HEAD:${GITHUB_REF_NAME}"

  job_06_建立菜单结构:
    name: job_06_建立菜单结构
    needs: job_05_定义基础规范
    runs-on: ubuntu-latest
    steps:
      - name: 检出代码
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 拉取最新提交
        run: git pull --rebase origin "${GITHUB_REF_NAME}" || true

      - name: 检查前置阶段是否完成
        run: |
          test -f "$状态目录/job_05_定义基础规范.json"
          grep -q '"status":[[:space:]]*"completed"' "$状态目录/job_05_定义基础规范.json"

      - name: 检查当前阶段是否已完成
        id: 检查状态
        run: |
          状态文件="$状态目录/job_06_建立菜单结构.json"
          if [ -f "$状态文件" ] && grep -q '"status":[[:space:]]*"completed"' "$状态文件"; then
            echo "已完成=true" >> "$GITHUB_OUTPUT"
          else
            echo "已完成=false" >> "$GITHUB_OUTPUT"
          fi

      - name: 生成菜单结构文档
        if: steps.检查状态.outputs.已完成 != 'true'
        run: |
          mkdir -p "$文档目录/03-information-architecture"

          cat > "$文档目录/03-information-architecture/menu-tree.md" <<'EOF'
          # 菜单树
          - 状态：已完成
          - 生成阶段：job_06_建立菜单结构
          EOF

          cat > "$文档目录/03-information-architecture/module-map.md" <<'EOF'
          # 模块图
          - 状态：已完成
          - 生成阶段：job_06_建立菜单结构
          EOF

      - name: 写入阶段状态
        if: steps.检查状态.outputs.已完成 != 'true'
        run: |
          cat > "$状态目录/job_06_建立菜单结构.json" <<EOF
          {
            "job": "job_06_建立菜单结构",
            "status": "completed",
            "scope": "${执行范围}"
          }
          EOF

      - name: 提交当前阶段成果
        if: steps.检查状态.outputs.已完成 != 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add "$文档目录" "$状态目录" || true
          git diff --cached --quiet && echo "没有变更，无需提交。" && exit 0
          git commit -m "docs(requirements): 完成阶段 job_06_建立菜单结构"
          git pull --rebase origin "${GITHUB_REF_NAME}" || true
          git push origin "HEAD:${GITHUB_REF_NAME}"

  job_07_扩展功能树:
    name: job_07_扩展功能树
    needs: job_06_建立菜单结构
    runs-on: ubuntu-latest
    steps:
      - name: 检出代码
        uses: actions/checkout@v4
        with:
